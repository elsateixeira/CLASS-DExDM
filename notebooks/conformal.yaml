# Cobaya test input for CLASS-DExDM with conformal coupling

likelihood:
  planck_2018_lowl.TT: {}
  planck_2018_lowl.EE: {}
  planck_2018_highl_plik.TTTEEE: {}
  # Full CMB likelihoods including ACT and SPT
  # planck_2018_lensing.clik: {}  # optional
  bao.desi_dr2: {}               # DESI DR2 BAO (all tracers)
  sn.pantheonplus: {}            # Pantheon+ (no SH0ES)

theory:
  classy:
    # path: /path/to/CLASS-DExDM  # change if installing
    path: /Users/elsateixeira/Library/CloudStorage/GoogleDrive-elsa.teixeira.14@gmail.com/My Drive/Projects/CLASS-DExDM
    extra_args:
      output: tCl,pCl,lCl
      l_max_scalars: 2500
      scf_potential: exp
      scf_coupling_type: conformal
      attractor_ic_scf: no
      scf_shooting_target: scf_V0 
      scf_V0: 1.0
      scf_C0: 1.0
      scf_phi_ini: 1.0
      scf_phi_prime_ini: -1e-8
      Omega_scf: -1 
      omega_cdm: 1e-10    

params:
  # Base LCDM parameters (we can adjust priors if we want)
  omega_b:
    prior: {min: 0.005, max: 0.1}
    ref: {dist: norm, loc: 0.0224, scale: 0.0002}
    proposal: 0.0001
    latex: \Omega_b h^2
  omega_idm:
    prior: {min: 0.001, max: 0.99}
    ref: {dist: norm, loc: 0.12, scale: 0.01}
    proposal: 0.005
    latex: \Omega_{\rm idm} h^2
  H0:
    prior: {min: 50, max: 90}
    ref: {dist: norm, loc: 67.5, scale: 1.0}
    proposal: 0.5
    latex: H_0
  tau_reio:
    prior: {min: 0.01, max: 0.2}
    ref: {dist: norm, loc: 0.055, scale: 0.01}
    proposal: 0.005
  A_s:
    prior: {min: 1e-10, max: 3e-9}
    ref: {dist: norm, loc: 2.1e-9, scale: 0.1e-9}
    proposal: 0.05e-9
    latex: A_s
  n_s:
    prior: {min: 0.8, max: 1.2}
    ref: {dist: norm, loc: 0.965, scale: 0.01}
    proposal: 0.005
    latex: n_s

  # Scalar-field parameters
  scf_lambda:
    prior: {min: 0., max: 2.0}
    ref: {dist: norm, loc: 0.1, scale: 0.1}
    proposal: 0.05
    latex: \lambda_{\rm scf}
  scf_beta:
    prior: {min: -5.0, max: 5.0}
    ref: {dist: norm, loc: 0.0, scale: 0.1}
    proposal: 0.05
    latex: \beta_{\rm scf}

sampler:
  mcmc:
    drag: true
    oversample_power: 0.4
    proposal_scale: 1.9
    covmat: auto
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    max_tries: 1000000