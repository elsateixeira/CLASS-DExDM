# Cobaya test input for darkin-class with conformal coupling

theory:
  classy:
    # path: /path/to/darkin-class  # change if installing
    path: /sps/lupm/eteixeir/Codes/darkin-class
    extra_args:
      output: mPk
      lensing: yes
      P_k_max_1/Mpc: 1.0
      l_max_scalars: 3000
      scf_potential: exp
      scf_coupling_type: conformal
      attractor_ic_scf: no
      scf_shooting_target: scf_V0 
      scf_V0: 1.0
      scf_C0: 1.0
      scf_phi_ini: 1.0
      scf_phi_prime_ini: -1e-8
      Omega_Lambda: 0.0
      Omega_fld: 0.0
      Omega_scf: -1 
      omega_cdm: 1e-10    
      N_ur: 2.0328
      N_ncdm']: 1
      m_ncdm: 0.06
      T_ncdm: 0.71611

  # Full CMB likelihoods including ACT and SPT
likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE_sroll2: null

  act_dr6_cmbonly.PlanckActCut:
    dataset_params:
      use_cl: tt te ee
      lmin_cuts: 0 0 0
      lmax_cuts: 1000 600 600
    params:
      A_planck:
        prior:
          min: 0.5
          max: 1.5
        ref:
          dist: norm
          loc: 1.0
          scale: 0.1
        latex: A_{\rm planck}
        proposal: 0.003

  act_dr6_cmbonly.ACTDR6CMBonly:
    input_file: dr6_data_cmbonly.fits
    lmax_theory: 9000
    ell_cuts:
      TT: [600, 8500]
      TE: [600, 8500]
      EE: [600, 8500]
    stop_at_error: true
    params:
      A_act:
        value: "lambda A_planck: A_planck"
        latex: A_{\rm ACT}
      P_act:
        prior:
          min: 0.9
          max: 1.1
        ref:
          dist: norm
          loc: 1.0
          scale: 0.01
        proposal: 0.01
        latex: p_{\rm ACT}

  act_dr6_lenslike.ACTDR6LensLike:
    lens_only: false
    stop_at_error: true
    lmax: 4000
    variant: actplanck_baseline

  candl_like:
    additional_args: {}
    clear_internal_priors: true
    data_set_file: !!python/name:spt_candl_data.SPT3G_D1_TnE ''
    external: !!python/name:candl.interface.CandlCobayaLikelihood ''
    variant: lite
    feedback: true
    wrapper: null

  muse3glike.cobaya.spt3g_2yr_delensed_ee_optimal_pp_muse:
    python_path: /g100/home/userexternal/aferri00/run_entropy/packages/code/muse3g_like/muse_3g_like_march_2025/src
    components:
      - "\u03D5\u03D5"
  bao.desi_dr2: null               # DESI DR2 BAO (all tracers)
  sn.pantheonplus: null            # Pantheon+ (no SH0ES)


params:
  # Base LCDM parameters (we can adjust priors if we want)
  omega_b:
    prior: {min: 0.005, max: 0.1}
    ref: {dist: norm, loc: 0.0224, scale: 0.0002}
    proposal: 0.0001
    latex: \Omega_b h^2
  omega_idm:
    prior: {min: 0.001, max: 0.99}
    ref: {dist: norm, loc: 0.12, scale: 0.01}
    proposal: 0.005
    latex: \Omega_{\rm idm} h^2
  H0:
    prior: {min: 50, max: 90}
    ref: {dist: norm, loc: 67.5, scale: 1.0}
    proposal: 0.5
    latex: H_0
  tau_reio:
    prior: {min: 0.01, max: 0.2}
    ref: {dist: norm, loc: 0.055, scale: 0.01}
    proposal: 0.005
  A_s:
    prior: {min: 1e-10, max: 3e-9}
    ref: {dist: norm, loc: 2.1e-9, scale: 0.1e-9}
    proposal: 0.05e-9
    latex: A_s
  n_s:
    prior: {min: 0.8, max: 1.2}
    ref: {dist: norm, loc: 0.965, scale: 0.01}
    proposal: 0.005
    latex: n_s

  # Scalar-field parameters
  scf_lambda:
    prior: {min: 0., max: 2.0}
    ref: {dist: norm, loc: 0.1, scale: 0.1}
    proposal: 0.05
    latex: \lambda_{\rm scf}
  scf_beta:
    prior: {min: -5.0, max: 5.0}
    ref: {dist: norm, loc: 0.0, scale: 0.1}
    proposal: 0.05
    latex: \beta_{\rm scf}

sampler:
  mcmc:
    drag: true
    oversample_power: 0.4
    proposal_scale: 1.9
    covmat: auto
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    max_tries: 1000000