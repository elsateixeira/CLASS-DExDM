theory:
  classy:
    # path: /path/to/darkin-class  # change if installing
    # path: /sps/lupm/eteixeir/Codes/darkin-class/
    extra_args:
      N_ncdm: 1
      N_ur: 2.0328
      non linear: halofit
      output: tCl,pCl,lCl
      l_max_scalars: 9000
      scf_potential: "exp"
      scf_coupling_type: "entropy"
      attractor_ic_scf: "no"
      scf_shooting_target: "scf_V0"
      scf_V0: 1.0
      scf_C0: 1.0
      scf_g0: 0.0
      scf_As: 1.0
      scf_ns: 0.0
      scf_kp: 0.05
      scf_kc: 1.0
      scf_pc: 2.0
      scf_phi_ini: 1.0
      scf_phi_prime_ini: -8.0e-12
      Omega_scf: -1
      Omega_Lambda: 0
      Omega_fld: 0
      omega_cdm: 1e-10
likelihood:
  bao.desi_dr2: null
  sn.pantheonplus: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE_sroll2: null
  act_dr6_cmbonly.PlanckActCut:
    dataset_params:
      use_cl: tt te ee
      lmin_cuts: 0 0 0
      lmax_cuts: 1000 600 600
    params:
      A_planck:
        prior:
          min: 0.5
          max: 1.5
        ref:
          dist: norm
          loc: 1.0
          scale: 0.1
        latex: A_{\rm planck}
        proposal: 0.003
  act_dr6_cmbonly.ACTDR6CMBonly:
    input_file: dr6_data_cmbonly.fits
    lmax_theory: 9000
    ell_cuts:
      TT:
      - 600
      - 8500
      TE:
      - 600
      - 8500
      EE:
      - 600
      - 8500
    stop_at_error: true
    params:
      A_act:
        value: 'lambda A_planck: A_planck'
        latex: A_{\rm ACT}
      P_act:
        prior:
          min: 0.9
          max: 1.1
        ref:
          dist: norm
          loc: 1.0
          scale: 0.01
        proposal: 0.01
        latex: p_{\rm ACT}
  act_dr6_lenslike.ACTDR6LensLike:
    lens_only: false
    stop_at_error: true
    lmax: 4000
    variant: actplanck_baseline
  candl_like:
    additional_args: {}
    clear_internal_priors: true
    data_set_file: !!python/name:spt_candl_data.SPT3G_D1_TnE ''
    external: !!python/name:candl.interface.CandlCobayaLikelihood ''
    variant: lite
    feedback: true
    wrapper: null
  muse3glike.cobaya.spt3g_2yr_delensed_ee_optimal_pp_muse:
    python_path: /sps/lupm/eteixeir/Codes/cobaya_data/data/muse_3g_like_march_2025/src
    components:
    - "\u03D5\u03D5"
prior:
  cal_dip_prior: 'lambda A_act: stats.norm.logpdf(A_act, loc = 1.0, scale = 0.003)'
  gaussian_Tcal: 'lambda Tcal: stats.norm.logpdf(Tcal, loc=1.0, scale=0.0036)'
  
params:
  Tcal:
    prior:
      max: 1.2
      min: 0.8
    ref: 1.0
    latex: T_{\rm cal}
  Ecal:
    prior:
      max: 1.2
      min: 0.8
    ref: 1.0
    latex: E_{\rm cal}
  # Scalar-field parameters
  scf_lambda:
    prior: {min: 0., max: 2.0}
    ref: {dist: norm, loc: 0.1, scale: 0.1}
    proposal: 0.05
    latex: \lambda_{\rm scf}
  scf_h0:
    prior: {min: -1.0, max: 1.0}
    ref: {dist: norm, loc: 0.0, scale: 0.1}
    proposal: 0.05
    latex: h_{0,\rm scf}
  # end-Scalar-field parameters
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.001
    proposal: 0.001
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
    derived: true
    renames:
    - As
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 0.965
      scale: 0.004
    proposal: 0.002
    latex: n_\mathrm{s}
    renames:
    - ns
  theta_s_1e2:
    prior:
      min: 0.5
      max: 10
    ref:
      dist: norm
      loc: 1.0416
      scale: 0.0004
    proposal: 0.0002
    latex: 100\theta_\mathrm{s}
    drop: true
  100*theta_s:
    value: 'lambda theta_s_1e2: theta_s_1e2'
    derived: false
  H0:
    latex: H_0
    derived: true
  omega_b:
    prior:
      min: 0.005
      max: 0.1
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  omega_idm:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2
    renames:
    - omegach2
  Omega_m:
    latex: \Omega_\mathrm{m}
    derived: true
    renames:
    - omegam
  omegamh2:
    derived: 'lambda Omega_m, H0: Omega_m*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  m_ncdm:
    value: 0.06
    renames: mnu
  YHe:
    latex: Y_\mathrm{P}
    derived: true
    renames:
    - yheused
    - yhe
  tau_reio:
    prior:
      min: 0.01
      max: 0.8
    ref:
      dist: norm
      loc: 0.055
      scale: 0.006
    proposal: 0.003
    latex: \tau_\mathrm{reio}
  z_reio:
    latex: z_\mathrm{re}
    derived: true
    renames:
    - zrei
  sigma8:
    latex: \sigma_8
    derived: true
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, Omega_m: sigma8*Omega_m**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, Omega_m: sigma8*Omega_m**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  A:
    derived: 'lambda A_s: 1e9*A_s'
    latex: 10^9 A_\mathrm{s}
  clamp:
    derived: 'lambda A_s, tau_reio: 1e9*A_s*np.exp(-2*tau_reio)'
    latex: 10^9 A_\mathrm{s} e^{-2\tau}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
    derived: true
  rs_drag:
    latex: r_\mathrm{drag}
    derived: true
    renames:
    - rdrag
sampler:
  mcmc:
    drag: true
    oversample_power: 0.4
    proposal_scale: 1.2
    covmat: auto
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    max_tries: 1000000
output: /sps/lupm/eteixeir/Codes/entropy_derivative_runs/run0
stop_at_error: false
